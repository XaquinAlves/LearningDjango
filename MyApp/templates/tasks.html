{% extends 'layouts/base.html' %}
{% block content %}
    <header>
        <h1>Lista de tareas</h1>
    </header>
    <main>
        <table class="table table-striped table-bordered">
            <thead>
            <tr>
                <th>Titulo</th>
                <th>Descripción</th>
                <th>Proyecto</th>
            </tr>
            </thead>
            <tbody>
            {% for task in tasks_list %}
                <tr>
                    <td>
                        {% if task.done %}
                                ✅
                            {% else %}
                                ❌
                            {% endif %}
                        {{ task.title }}
                    </td>
                    <td>{{ task.description }}</td>
                    <td>{{ task.project_id }}</td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
    </main>
{% endblock %}
